<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Slime Clicker 2</title>
    <style>
      body {
        padding: 0; margin: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at center, #2e1a4d 0%, #050110 100%);
        font-family: "Segoe UI", sans-serif;
        overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh;
      }
      #unity-container {
        position: relative;
        width: 960px; height: 600px; /* Стандартный размер, можно менять */
        border: 4px solid #16d9e3;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(22, 217, 227, 0.4);
        background: #000;
        overflow: hidden;
      }
      canvas { width: 100%; height: 100%; display: block; }
 
      /* Загрузка */
      #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
      #unity-progress-bar-empty {
        width: 250px; height: 15px; 
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px; border: 2px solid #16d9e3; overflow: hidden;
      }
      #unity-progress-bar-full {
        width: 0%; height: 100%;
        background: linear-gradient(90deg, #ff00ff, #f3bad6);
        box-shadow: 0 0 10px #ff00ff;
      }
 
      /* Футер */
      #unity-footer {
        position: absolute; bottom: 0; width: 100%; height: 40px;
        background: rgba(5, 1, 16, 0.8);
        border-top: 1px solid #16d9e3;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 15px; box-sizing: border-box;
      }
      #unity-build-title { color: #ff9900; font-weight: bold; font-size: 14px; text-shadow: 0 0 5px #ff9900; }
 
      /* Кнопка без картинки (на чистом CSS) */
      #unity-fullscreen-button {
        width: 25px; height: 25px;
        cursor: pointer;
        border: 2px solid #16d9e3;
        border-radius: 5px;
        color: #16d9e3;
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; font-size: 18px;
        transition: 0.2s;
      }
      #unity-fullscreen-button:hover { background: #16d9e3; color: #000; transform: scale(1.1); }
      #unity-fullscreen-button::after { content: '⛶'; } /* Символ полного экрана */
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar">
        <div style="color: #ff00ff; margin-bottom: 10px; text-align: center;">LOADING SLIMES...</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-footer">
        <div id="unity-build-title">SLIME CLICKER 2</div>
        <div id="unity-fullscreen-button"></div>
      </div>
    </div>
 
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
 
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
      };
 
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
